  <rect x="32" y="162" width="160" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="48" cy="174" r="4" fill="#3fb950"/>
  <text x="58" y="179" fill="#c9d1d9" font-size="11">open to collaborate</text>

  <rect x="202" y="162" width="126" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="218" cy="174" r="4" fill="#58a6ff"/>
  <text x="228" y="179" fill="#c9d1d9" font-size="11">Polkadot Africa</text>

  <rect x="338" y="162" width="118" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="354" cy="174" r="4" fill="#d2a8ff"/>
  <text x="364" y="179" fill="#c9d1d9" font-size="11">Nairobi, Kenya</text>

  <!-- Divider -->
  <line x1="32" y1="200" x2="648" y2="200" stroke="#21262d" stroke-width="1"/>

  <!-- Languages section -->
  <text x="32" y="224" fill="#3fb950" font-size="12">##</text>
  <text x="56" y="224" fill="#58a6ff" font-size="12" font-weight="500"> languages &amp; tools</text>

  <!-- Tool pills -->
  <rect x="32" y="234" width="60" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="48" cy="247" r="4" fill="#f74c00"/>
  <text x="57" y="251" fill="#c9d1d9" font-size="11">Rust</text>

  <rect x="102" y="234" width="94" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="118" cy="247" r="4" fill="#3178c6"/>
  <text x="127" y="251" fill="#c9d1d9" font-size="11">TypeScript</text>

  <rect x="206" y="234" width="96" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="222" cy="247" r="4" fill="#f7df1e"/>
  <text x="231" y="251" fill="#c9d1d9" font-size="11">JavaScript</text>

  <rect x="312" y="234" width="70" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="328" cy="247" r="4" fill="#3776ab"/>
  <text x="337" y="251" fill="#c9d1d9" font-size="11">Python</text>

  <rect x="392" y="234" width="60" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="408" cy="247" r="4" fill="#61dafb"/>
  <text x="417" y="251" fill="#c9d1d9" font-size="11">React</text>

  <!-- Divider -->
  <line x1="32" y1="276" x2="648" y2="276" stroke="#21262d" stroke-width="1"/>

  <!-- Connect section -->
  <text x="32" y="300" fill="#3fb950" font-size="12">##</text>
  <text x="56" y="300" fill="#58a6ff" font-size="12" font-weight="500"> connect</text>

  <rect x="32" y="310" width="142" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="327" fill="#58a6ff" font-size="11">✕ @kashortgirl</text>

  <rect x="184" y="310" width="230" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="196" y="327" fill="#3fb950" font-size="11">✉ mulandicecilia4@gmail.com</text>

  <!-- Footer -->
  <line x1="32" y1="350" x2="648" y2="350" stroke="#21262d" stroke-width="1"/>
  <text x="32" y="368" fill="#484f58" font-size="11" font-style="italic">⚡ i love learning and experimenting with new technologies</text>

  <!-- Blinking cursor (animated) -->
  <rect x="32" y="356" width="8" height="14" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
