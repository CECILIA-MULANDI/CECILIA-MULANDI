<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="380" rx="10" fill="#0d1117"/>

  <!-- Window chrome dots -->
  <circle cx="24" cy="24" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="6" fill="#febc2e"/>
  <circle cx="64" cy="24" r="6" fill="#28c840"/>

  <!-- Top bar line -->
  <line x1="0" y1="44" x2="680" y2="44" stroke="#21262d" stroke-width="1"/>

  <!-- Terminal title -->
  <text x="340" y="28" text-anchor="middle" fill="#484f58" font-size="12">bash — cecilia@blockchain</text>

  <!-- Prompt line -->
  <text x="32" y="80" fill="#3fb950" font-size="13" font-weight="500">cecilia@blockchain</text>
  <text x="196" y="80" fill="#c9d1d9" font-size="13">:~$</text>
  <text x="230" y="80" fill="#58a6ff" font-size="13">whoami</text>

  <!-- Name output -->
  <text x="32" y="110" fill="#c9d1d9" font-size="22" font-weight="700">Cecilia Mulandi</text>

  <!-- Title line -->
  <text x="32" y="136" fill="#8b949e" font-size="13">Blockchain Engineer</text>
  <text x="198" y="136" fill="#d2a8ff" font-size="13"> · Cryptography</text>

  <!-- Divider -->
  <line x1="32" y1="152" x2="648" y2="152" stroke="#21262d" stroke-width="1"/>

